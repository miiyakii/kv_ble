#
# prj_central.conf — Central (Dongle 1)
# BLE Central + HOGP client + USB CDC-ACM → km_relay
#
# SPDX-License-Identifier: Apache-2.0
#

CONFIG_NCS_SAMPLES_DEFAULTS=y
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n

# GPIO (LEDs)
CONFIG_GPIO=y

# PWM (breathing / blink effects)
CONFIG_PWM=y

# Logging via RTT
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_RTT=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_UART_CONSOLE=n

# Bluetooth Central
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SMP=y
CONFIG_BT_ATT_TX_COUNT=5

CONFIG_BT_DEVICE_NAME="KM-Switch-Central"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

CONFIG_BT_PRIVACY=y
CONFIG_BT_AUTO_PHY_UPDATE=n

# HOGP (HID over GATT Profile client)
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_DM=y
CONFIG_BT_HOGP=y
CONFIG_BT_HOGP_REPORTS_MAX=4

# Scanning with UUID filter
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_UUID_CNT=1

# Bond persistence
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# USB CDC-ACM (new USBD stack)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_SERIAL=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_HWINFO=y
CONFIG_SAMPLE_USBD_MANUFACTURER="KM-Switch"
CONFIG_SAMPLE_USBD_PRODUCT="KM-Central"
CONFIG_SAMPLE_USBD_PID=0x0002

# Stack sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192
